<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Js Clock Project</title>
</head>
<style>
  body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color:#282c34;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
  }
  .clock-container{
    text-align: center;
    border: 2px solid white;
    border-radius: 10px;
    font-size: 48px;
    padding: 20px;
    background-color: rgba(255,255,255,0.1);
  }
</style>
<body>
  <div class="clock-container">
    <h1 class="clock">00:00:00</h1>
    <audio src="ticking-clock copy.mp3" preload="auto"></audio>
  </div>
  <script>
    setInterval(() => {
      const element=document.querySelector('.clock');
    const sound=document.querySelector('audio');
    const time= new Date();
    const option={
      timeZone: 'Asia/Kolkata',
      hour: '2-digit',
      minute : '2-digit',
      second: '2-digit'
    }
    element.textContent=time.toLocaleTimeString('en-US',option);

      sound.play();
    }, 1000);
    
  </script>
</body>

</html>
